<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>metrocalk editor</title>
    <style>
      /* transparent so the native wgpu viewport composites through (ADR-008 single-window) */
      html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; font: 13px ui-monospace, monospace; color: #e8e8e8; }
      #app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
      .panel { background: rgba(20,22,28,0.92); border-right: 1px solid #2a2d35; overflow-y: auto; }
      .viewport { background: transparent; position: relative; } /* clicks here = native pick */
      h3 { margin: 10px 12px 6px; font-size: 12px; opacity: 0.7; text-transform: uppercase; }
      .row { padding: 3px 12px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .row.sel { background: #2a4365; color: #fff; }
      .field { display: flex; gap: 8px; align-items: center; padding: 3px 12px; }
      .field span { width: 70px; opacity: 0.8; }
      .field input { width: 90px; background: #11131a; color: #cfe; border: 1px solid #333; border-radius: 3px; padding: 2px 4px; }
      button { background: #2a4365; color: #fff; border: none; border-radius: 4px; padding: 4px 10px; margin: 8px 12px; cursor: pointer; }
      .req { padding: 2px 12px 6px; opacity: .7; }
      .cand { padding: 4px 12px; cursor: pointer; border-left: 3px solid #34d399; }
      .cand:hover { background: #163a2e; }
      .cand .meta { opacity: .55; font-size: 11px; }
      .grey { padding: 4px 12px; color: #8a8a8a; border-left: 3px solid #3a3a3a; }
      .grey .why { color: #d08a8a; font-size: 11px; }
      .boundrow { padding: 4px 12px; color: #9fe; border-left: 3px solid #2a4365; }
      .sectlabel { padding: 6px 12px 2px; font-size: 11px; opacity: .5; text-transform: uppercase; }
      #status { position: fixed; bottom: 8px; left: 8px; background: rgba(0,0,0,0.55); color: #9fe; padding: 4px 8px; border-radius: 4px; }
      #reject { position: fixed; bottom: 8px; right: 8px; max-width: 360px; background: rgba(120,20,20,0.92); color: #ffe8e8; border: 1px solid #f87171; padding: 8px 10px; border-radius: 6px; display: none; }
      #hint { position: absolute; top: 8px; left: 8px; color: rgba(255,255,255,0.4); }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="panel">
        <h3>metrocalk · editor (M2.6)</h3>
        <div style="padding:0 12px 6px;opacity:.6" id="count">connecting…</div>
        <!-- Wallet (M7): the token balance the paid tiers (generate/buy/edit) meter against. The engine
             is FREE forever — local build/bind/describe-local never touch this. Top-up is a SANDBOX
             ($10 ≈ 100 tokens) — no real money moves. -->
        <div style="padding:0 12px 6px;color:#fbbf24" id="wallet">⊞ <span id="walletBal">…</span> tokens
          <button id="topup" style="margin:0 0 0 6px;padding:2px 8px;font-size:11px;background:#4a3a1f">Top up +100</button>
        </div>
        <button id="undo">⟲ Undo (Ctrl-Z)</button>
        <!-- M8.2 physics: drop a deterministic dynamic ball (one undoable spawn → falls under gravity,
             simulated natively on the engine thread; pause keeps setup editable). -->
        <div style="padding:0 12px 6px;display:flex;gap:6px;align-items:center">
          <button id="dropBall" style="margin:0;padding:3px 10px;background:#4a3f2f">🏀 Drop a ball</button>
          <button id="simToggle" style="margin:0;padding:3px 10px;background:#2f3a4a">⏸ Pause sim</button>
        </div>
        <h3>Create</h3>
        <!-- Two doors over ONE catalog + one instantiate (M3.4): BROWSE ("+ Add" palette, categories +
             search) and DESCRIBE (type it). Both reach the same pre-componentized, undoable instantiate. -->
        <div style="padding:0 12px 6px;display:flex;gap:6px">
          <button id="addBtn" style="margin:0;padding:3px 10px;background:#2f4a3a">+ Add (browse)</button>
          <input id="describe" placeholder="or describe: e.g. health bar" style="flex:1" />
          <button id="describeBtn" style="margin:0;padding:3px 10px">Create</button>
          <button id="genBtn" style="margin:0;padding:3px 10px;display:none;background:#3a2f4a">Generate?</button>
        </div>
        <h3>Requirers — click one to bind</h3>
        <div id="requirers" style="padding:0 12px 6px;opacity:.6">scanning…</div>
        <h3>Inspector</h3>
        <div id="inspector" style="padding:0 12px 12px;opacity:.6">Click an entity in the viewport.</div>
        <h3>Bind by intent</h3>
        <div id="reveal" style="padding:0 12px 12px;opacity:.6">Select a HealthBar to see compatible targets.</div>
        <h3>Hierarchy</h3>
        <div id="list"></div>
      </div>
      <div class="viewport" id="viewport"><div id="hint">native wgpu viewport — click an entity to select</div></div>
    </div>
    <div id="status">booting</div>
    <div id="reject"></div>

    <!-- The "+ Add" command palette (M3.4): a search bar on top (live filter via the catalog query,
         which reuses the resolver) + the catalog browsed by category. Each item previews its caps/price.
         A no-hit search falls through to the generate seam. One catalog, one instantiate. -->
    <div id="palette" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:50">
      <div style="position:absolute;top:8%;left:50%;transform:translateX(-50%);width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column;background:rgba(20,22,28,.98);border:1px solid #2a4365;border-radius:8px;overflow:hidden">
        <div style="display:flex;gap:6px;padding:10px;border-bottom:1px solid #2a2d35">
          <input id="palSearch" placeholder="Search the catalog (or type to describe) …" style="flex:1;font-size:14px;padding:5px 8px" autocomplete="off" />
          <button id="palClose" style="margin:0;padding:3px 10px;background:#3a3a3a">esc</button>
        </div>
        <div id="palBody" style="overflow-y:auto;padding:4px 0 10px"></div>
      </div>
    </div>

    <script>
      const { invoke, Channel } = window.__TAURI__.core;
      // projection store: id -> { name, parentId, components }
      const store = new Map();
      let selected = null;
      let opSeq = 0;
      const pending = new Map(); // clientOpId -> intent (for optimistic display, dropped on confirm)

      const $ = (id) => document.getElementById(id);
      const status = (s) => ($("status").textContent = s);

      function applyDelta(d) {
        for (const op of d.ops || []) {
          if (op.op === "upsert") {
            const e = store.get(op.id) || { name: op.id, parentId: null, components: {} };
            if (op.name != null) e.name = op.name;
            if (op.parentId !== undefined) e.parentId = op.parentId;
            // A re-projection of an entity is authoritative for its edges: clear them so the addEdge ops
            // in THIS delta re-establish the live set. project_full (sent on connect AND on every undo)
            // emits all upserts before its edges, so without this the surviving edges re-append (badge
            // says "tracking 4" for 2) and an undone edge never drops. Incremental bind echoes carry an
            // addEdge with no upsert, so they still accumulate correctly.
            e.edges = [];
            store.set(op.id, e);
          } else if (op.op === "remove") {
            store.delete(op.id);
          } else if (op.op === "setField") {
            const e = store.get(op.id); if (e) { (e.components[op.component] ||= {})[op.field] = op.value; }
          } else if (op.op === "addEdge") {
            const e = store.get(op.from); if (e) { (e.edges ||= []).push({ rel: op.rel, to: op.to }); }
          } else if (op.op === "removeEdge") {
            const e = store.get(op.from); if (e && e.edges) { e.edges = e.edges.filter((x) => !(x.rel === op.rel && x.to === op.to)); }
          }
        }
        for (const c of d.confirms || []) pending.delete(c);
        for (const r of d.rejects || []) { pending.delete(r.clientOpId); showReject(r.reason); }
        renderList(); renderInspector(); maybeRestoreFocus();
      }

      // On the first projection that carries bindings — the connect-time project_full after a reload —
      // auto-select the requirer tracking the most, so the user immediately sees their restored work
      // ("tracking ✓ …") instead of an empty panel they'd have to re-find the entity to populate. Runs
      // once, and never overrides a selection the user has already made.
      let didRestoreFocus = false;
      function maybeRestoreFocus() {
        if (didRestoreFocus || selected) return;
        const tracking = [...store.entries()]
          .filter(([, e]) => e.components && e.components.HealthBar && (e.edges || []).length);
        if (!tracking.length) return;
        didRestoreFocus = true;
        tracking.sort((a, b) => b[1].edges.length - a[1].edges.length);
        const [id, e] = tracking[0];
        select(id);
        status("restored — " + id + " tracking " + e.edges.length);
      }

      function renderList() {
        $("count").textContent = store.size + " entities";
        const ids = [...store.keys()].slice(0, 400);
        $("list").innerHTML = ids.map((id) =>
          `<div class="row ${id===selected?'sel':''}" data-id="${id}">${(store.get(id).name)}</div>`).join("");
        for (const el of $("list").querySelectorAll(".row")) el.onclick = () => select(el.dataset.id);
        renderRequirers();
      }

      // The requirers (entities that require a capability — here HealthBars) are the bindable starting
      // points for test #1. They're rare in the scene, so surface them directly: one click reveals
      // their compatible targets. Identified from the projection (entities carrying a HealthBar component).
      function renderRequirers() {
        const all = [...store.entries()].filter(([, e]) => e.components && e.components.HealthBar);
        // Tracking requirers first, each with a "tracking N" badge — so a restored bind is always
        // visible regardless of entity-id order (the bound HealthBar may be a high id, past the cap).
        const trackCount = (e) => (e.edges || []).length;
        all.sort((a, b) => trackCount(b[1]) - trackCount(a[1]));
        const reqs = all.slice(0, 60);
        $("requirers").innerHTML = reqs.length
          ? reqs.map(([id, e]) => {
              const n = trackCount(e);
              const badge = n ? ` · <span style="color:#9fe">tracking ${n}</span>` : "";
              return `<div class="cand ${id===selected?'sel':''}" data-id="${id}">HealthBar · ${id}${badge}</div>`;
            }).join("")
          : "none found";
        for (const el of $("requirers").querySelectorAll(".cand")) el.onclick = () => select(el.dataset.id);
      }

      function renderInspector() {
        if (!selected || !store.has(selected)) { $("inspector").innerHTML = "Click an entity in the viewport."; return; }
        const e = store.get(selected);
        let html = `<div style="font-weight:700;margin-bottom:6px">${e.name}</div>`;
        for (const [comp, fields] of Object.entries(e.components)) {
          html += `<div style="opacity:.7;margin-top:4px">${comp}</div>`;
          for (const [f, v] of Object.entries(fields)) {
            html += `<div class="field"><span>${f}</span><input data-c="${comp}" data-f="${f}" value="${v}"/></div>`;
          }
        }
        // The live AI-edit (M7) — "make it rustier" rides the schema-validated patch path, metered at
        // the edit rate (≈2 tokens, debit-on-success). The real LLM is a seam; this is the deterministic
        // offline stand-in (sets MeshRenderer.material).
        html += `<button id="rustier" style="margin:8px 12px;background:#5a2f1f">✦ Make it rustier (≈2 tokens)</button>`;
        $("inspector").innerHTML = html;
        for (const inp of $("inspector").querySelectorAll("input")) {
          inp.onchange = () => editField(selected, inp.dataset.c, inp.dataset.f, parseMaybeNumber(inp.value));
        }
        const rb = $("rustier");
        if (rb) rb.onclick = () => doAiEdit(selected);
      }
      const parseMaybeNumber = (s) => { const n = Number(s); return s.trim() !== "" && !isNaN(n) ? n : s; };

      function select(id) { selected = id; renderList(); renderInspector(); revealFor(id); }

      // ── binding by intent (north-star test #1) ─────────────────────────────────
      // On select, ask the core what this entity can connect to: ranked compatible targets, every
      // incompatible greyed with its reason, plus what it already tracks. Computed in Rust over the
      // engine's world (the M1.5 query); the hot path never crosses JS (inv. 4).
      async function revealFor(id) {
        const box = $("reveal");
        if (!id) { box.innerHTML = "Select a HealthBar to see compatible targets."; return; }
        let r;
        try { r = await invoke("reveal_targets", { id }); }
        catch (e) { box.innerHTML = "reveal failed: " + e; return; }
        renderReveal(id, r);
      }

      function renderReveal(id, r) {
        const box = $("reveal");
        if ((r.required || []).length === 0) {
          box.innerHTML = `<div class="req">No required capabilities — nothing to bind.</div>`;
          return;
        }
        let html = `<div class="req">requires <b>${r.required.join(", ")}</b></div>`;
        if ((r.bound || []).length) {
          html += `<div class="sectlabel">tracking</div>`;
          html += r.bound.map((b) => `<div class="boundrow">✓ ${b.name}</div>`).join("");
        }
        html += `<div class="sectlabel">compatible (${r.compatible.length}) — click to bind</div>`;
        html += r.compatible.length
          ? r.compatible.map((c) =>
              `<div class="cand" data-to="${c.id}">${c.name}
                 <div class="meta">${c.distance.toFixed(1)}m · fit ${c.affinity}</div></div>`).join("")
          : `<div class="grey">none available</div>`;
        if ((r.greyed || []).length) {
          html += `<div class="sectlabel">incompatible</div>`;
          html += r.greyed.slice(0, 12).map((g) =>
              `<div class="grey">${g.name}<div class="why">✕ ${g.reason}</div></div>`).join("");
        }
        box.innerHTML = html;
        for (const el of box.querySelectorAll(".cand")) el.onclick = () => doBind(id, el.dataset.to);
      }

      async function doBind(from, to) {
        await invoke("bind_target", { from, to });
        status("bound → " + to);
        // re-reveal: the just-bound target is now consumed and shows under "tracking"
        setTimeout(() => revealFor(from), 30);
      }

      function editField(id, component, field, value) {
        const clientOpId = "ui-" + (++opSeq);
        const intent = { kind: "setField", id, component, field, value };
        pending.set(clientOpId, intent);
        // optimistic local apply
        const e = store.get(id); if (e) { (e.components[component] ||= {})[field] = value; }
        invoke("submit_edit", { tx: { clientOpId, label: `set ${component}.${field}`, patches: [], intent } });
        status(`edit ${component}.${field} = ${value}`);
      }

      function showReject(reason) {
        const r = $("reject"); r.textContent = "✕ rejected — " + reason; r.style.display = "block";
        setTimeout(() => (r.style.display = "none"), 4000);
      }

      // Describe-to-create (north-star test #2): free text → the core resolves it locally + drops in a
      // pre-componentized entity (one undoable transaction), then selects it so its attach targets reveal.
      async function doDescribe() {
        const q = $("describe").value.trim();
        if (!q) return;
        const r = await invoke("describe", { query: q });
        setWallet(r.balance); // M7: any tier may have moved the balance
        if (r.created) {
          if (r.source === "marketplace") {
            // Marketplace tier (M7): BOUGHT — the price was debited, ~70% accrued to the creator (no
            // real money). Show the cost + the new balance.
            const econ = r.price != null ? " · −" + r.price + " tokens (creator keeps ~70%)" : "";
            status("marketplace: bought " + r.kind + " · " + r.created + econ + " · ⊞ " + r.balance + " left");
          } else {
            status("local: created " + r.kind + " · " + r.created + " (free)");
          }
          setTimeout(() => select(r.created), 60); // let the echoed delta land in the store, then focus it
        } else if (r.seam && r.seam.startsWith("insufficient")) {
          // Marketplace buy refused (broke) — the honest "top up?" UX (no scene change).
          status(r.seam);
        } else if (r.seam === "generate") {
          // Tier 3, OPT-IN: nothing local or on the marketplace — offer Generate (the metered last resort).
          pendingGen = q;
          $("genBtn").style.display = "inline-block";
          status('no local or marketplace match for "' + q + '" — Generate? (≈10 tokens, last resort)');
        } else {
          status('no match for "' + q + '"');
        }
      }
      // M6 generation (opt-in): a grey placeholder drops in instantly; the real mesh streams in async
      // over the projection Channel (applyDelta swaps MeshRenderer.mesh) — same entity, undoable.
      let pendingGen = null;
      async function doGenerate() {
        const q = pendingGen;
        if (!q) return;
        $("genBtn").style.display = "none";
        pendingGen = null;
        const g = await invoke("generate", { query: q });
        setWallet(g.balance);
        if (g.available && g.created) {
          setTimeout(() => select(g.created), 60);
          status("generating '" + q + "' — grey placeholder dropped (≈" + (g.cost || 10) + " tokens reserved; charged only on success); streaming the mesh in…");
        } else {
          status("generation " + (g.seam || "unavailable") + " — the local + marketplace paths are unaffected");
        }
      }
      $("genBtn").onclick = doGenerate;
      $("describeBtn").onclick = doDescribe;
      $("describe").addEventListener("keydown", (e) => { if (e.key === "Enter") doDescribe(); });

      // ── M8.2 physics: drop a deterministic dynamic ball + play/pause the sim. The spawn is ONE undoable
      // commit (Ctrl-Z removes the ball); a small x/z spread is recorded in the log so replay reproduces
      // it. The sim runs natively on the engine thread (no per-frame IPC) — the viewport just shows it move.
      let simRunning = true;
      $("dropBall").onclick = async () => {
        const x = (Math.random() - 0.5) * 2, z = (Math.random() - 0.5) * 2;
        const id = await invoke("spawn_body", { x, y: 8.0, z });
        if (id) { simRunning = true; $("simToggle").textContent = "⏸ Pause sim"; status("dropped a ball · " + id + " (falling)"); }
        else status("could not spawn a body");
      };
      $("simToggle").onclick = () => {
        simRunning = !simRunning;
        invoke("set_sim_running", { run: simRunning });
        $("simToggle").textContent = simRunning ? "⏸ Pause sim" : "▶ Resume sim";
        status(simRunning ? "sim running" : "sim paused");
      };

      // ── "+ Add" command palette (M3.4): BROWSE the catalog by category + a SEARCH bar (reuses the
      // resolver via catalog_search). Picking an item = the same undoable instantiate as describe; a
      // no-hit search falls through to the generate seam. One catalog, one instantiate path.
      const palette = $("palette"), palBody = $("palBody"), palSearch = $("palSearch");
      function openPalette() { palette.style.display = "block"; palSearch.value = ""; palSearch.focus(); renderBrowse(); }
      function closePalette() { palette.style.display = "none"; }
      $("addBtn").onclick = openPalette;
      $("palClose").onclick = closePalette;
      palette.onclick = (e) => { if (e.target === palette) closePalette(); };
      window.addEventListener("keydown", (e) => { if (e.key === "Escape" && palette.style.display === "block") closePalette(); });

      function itemRow(it) {
        // The pre-componentized PREVIEW: what the working object brings (caps), its mesh, its price.
        const caps = (it.provides || []).map((c) => "+" + c).concat((it.requires || []).map((c) => "needs " + c)).join(" · ");
        const price = it.price != null ? " · ⊞" + it.price : (it.source === "local" ? " · free" : "");
        const mesh = it.asset ? " · ▣ " + it.asset : "";
        const color = it.source === "marketplace" ? "#fbbf24" : "#34d399";
        return `<div class="cand" data-id="${it.id}" data-src="${it.source}" style="border-left-color:${color}">
          <b>${it.label}</b>${price}<div class="meta">${caps}${mesh}</div></div>`;
      }
      function wireItems() { for (const el of palBody.querySelectorAll(".cand")) el.onclick = () => doAddItem(el.dataset.id, el.dataset.src); }
      async function renderBrowse() {
        const grouped = await invoke("catalog");
        let html = "";
        for (const [bucket, items] of Object.entries(grouped)) {
          html += `<div class="sectlabel">${bucket.replace(/^std:/, "")}</div>` + items.map(itemRow).join("");
        }
        palBody.innerHTML = html || `<div class="grey">catalog empty</div>`;
        wireItems();
      }
      async function renderSearch(q) {
        const r = await invoke("catalog_search", { query: q });
        let html = r.items.map(itemRow).join("");
        if (!r.items.length) {
          html = r.seam === "generate"
            ? `<div class="grey">no catalog match — <span id="palGen" style="color:#c9a7ff;cursor:pointer">Generate "${q}"? (≈10 tokens)</span></div>`
            : `<div class="grey">no match</div>`;
        }
        palBody.innerHTML = html;
        wireItems();
        const pg = $("palGen");
        if (pg) pg.onclick = () => { closePalette(); pendingGen = q; doGenerate(); };
      }
      let palTimer = null;
      palSearch.oninput = () => {
        clearTimeout(palTimer);
        const q = palSearch.value.trim();
        palTimer = setTimeout(() => (q ? renderSearch(q) : renderBrowse()), 120);
      };
      async function doAddItem(id, source) {
        const r = await invoke("add_item", { id, source });
        setWallet(r.balance);
        if (r.created) {
          closePalette();
          setTimeout(() => select(r.created), 60);
          status((source === "marketplace" ? "bought " : "added ") + id + (r.balance != null ? " · ⊞ " + r.balance + " left" : ""));
        } else {
          status(r.seam || ("could not add " + id));
        }
      }

      // Viewport input (invariant 4: the hot path stays in Rust).
      //  • LEFT click → native ray-pick. Send a NORMALIZED [0,1] window fraction (not pixels), so
      //    picking is correct at any display scaling (the wgpu surface spans the whole window).
      //  • RIGHT drag → orbit: we send only drag_start / drag_end (2 calls per gesture); the render
      //    loop polls the cursor and orbits natively — ZERO invokes per frame.
      //  • WHEEL → zoom (one call per tick, not per frame).
      const vp = $("viewport");
      vp.addEventListener("contextmenu", (ev) => ev.preventDefault());
      // M3.3: track the right-mousedown so a sub-threshold mouseup reads as a CLICK (→ context menu),
      // while a right-DRAG still orbits natively (zero-per-frame-IPC, unchanged).
      let rcStart = null;
      const MOVE_THRESHOLD = 6; // px; below this a right-press is a click, not an orbit
      vp.addEventListener("mousedown", async (ev) => {
        if (ev.button === 2) { rcStart = { x: ev.clientX, y: ev.clientY }; invoke("drag_start"); return; } // right = orbit-or-menu
        if (ev.button !== 0) return;
        if (focusMode) doUnfocus(); // a plain click returns to the normal overview before re-picking
        const x = ev.clientX / window.innerWidth;
        const y = ev.clientY / window.innerHeight;
        const id = await invoke("viewport_pick", { x, y });
        if (id) { select(id); status("picked " + id); }
        else { selected = null; renderList(); renderInspector(); revealFor(null); status("picked nothing here"); }
      });
      window.addEventListener("mouseup", async (ev) => {
        invoke("drag_end"); // end any orbit on release
        if (ev.button === 2 && rcStart) {
          const moved = Math.hypot(ev.clientX - rcStart.x, ev.clientY - rcStart.y);
          rcStart = null;
          if (moved < MOVE_THRESHOLD) await openContextMenu(ev.clientX, ev.clientY); // a click → menu
        }
      });
      vp.addEventListener("wheel", (ev) => { ev.preventDefault(); invoke("zoom", { delta: ev.deltaY * 0.04 }); }, { passive: false });

      // ── M3.3: viewport context menu (right-click) + hover details — the "context reveal" ──────────
      const ctxmenu = document.createElement("div");
      ctxmenu.id = "ctxmenu";
      ctxmenu.style.cssText = "position:fixed;z-index:60;display:none;min-width:160px;background:#1b2230;border:1px solid #38415a;border-radius:6px;box-shadow:0 6px 22px rgba(0,0,0,.5);font-size:13px;overflow:hidden";
      document.body.appendChild(ctxmenu);
      const tooltip = document.createElement("div");
      tooltip.id = "tooltip";
      tooltip.style.cssText = "position:fixed;z-index:50;display:none;pointer-events:none;max-width:280px;background:#10141f;border:1px solid #2a3550;border-radius:6px;padding:6px 9px;font-size:12px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.5)";
      document.body.appendChild(tooltip);

      // ── M3.3 Focus mode banner ─────────────────────────────────────────────────────────────────
      // While an entity is focused the viewport grays out the rest + zooms in; this banner is the
      // visible affordance to return to normal (click it, or press Esc). `focusMode` mirrors the Rust
      // state so the E2E/WebView test (and the Escape handler) can assert + toggle it deterministically.
      let focusMode = false;
      const focusBanner = document.createElement("div");
      focusBanner.id = "focusbanner";
      focusBanner.style.cssText = "position:fixed;z-index:65;display:none;top:12px;left:50%;transform:translateX(-50%);background:#1b2230;border:1px solid #ffd24a;color:#ffe7a3;border-radius:16px;padding:5px 14px;font-size:12px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.5)";
      document.body.appendChild(focusBanner);
      async function enterFocus(id) {
        focusMode = true;
        focusBanner.textContent = "🔍 Focused: " + id + "  ·  click or press Esc to exit";
        focusBanner.style.display = "block";
        // Surface the Rust camera state into the DOM so the E2E can assert "got nearby" (distance) and
        // the dim flag without reading the under-WebView GPU surface (ADR-008).
        try {
          const [dist, focused] = await invoke("focus_debug");
          focusBanner.dataset.dist = dist;
          focusBanner.dataset.focused = focused;
        } catch (e) {}
      }
      function doUnfocus() {
        if (!focusMode) return;
        focusMode = false;
        focusBanner.style.display = "none";
        invoke("unfocus");
        status("focus cleared");
      }
      focusBanner.addEventListener("click", doUnfocus);

      const hideMenu = () => { ctxmenu.style.display = "none"; };
      const hideTip = () => { tooltip.style.display = "none"; lastHover = null; };
      document.addEventListener("click", hideMenu);
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") { hideMenu(); doUnfocus(); } });

      async function openContextMenu(cx, cy) {
        if (hoverTimer) clearTimeout(hoverTimer);
        hideTip();
        const id = await invoke("viewport_peek", { x: cx / window.innerWidth, y: cy / window.innerHeight });
        if (!id) { hideMenu(); status("nothing under the cursor"); return; }
        const actions = await invoke("entity_actions", { id });
        ctxmenu.innerHTML = "";
        const head = document.createElement("div");
        head.textContent = id;
        head.style.cssText = "padding:4px 12px;opacity:.55;font-size:11px;border-bottom:1px solid #2a3142";
        ctxmenu.appendChild(head);
        for (const a of actions) {
          const item = document.createElement("div");
          item.className = "ctxitem" + (a.available ? "" : " disabled");
          item.dataset.action = a.action;
          item.textContent = a.available ? a.label : a.label + "  —  " + (a.reason || "unavailable");
          item.style.cssText = "padding:5px 12px;white-space:nowrap;cursor:" + (a.available ? "pointer" : "default") + ";opacity:" + (a.available ? "1" : ".4");
          if (a.available) {
            item.onmouseenter = () => (item.style.background = "#2a3550");
            item.onmouseleave = () => (item.style.background = "");
            item.onclick = (e) => { e.stopPropagation(); hideMenu(); runAction(a.action, id); };
          } else if (a.reason) { item.title = a.reason; }
          ctxmenu.appendChild(item);
        }
        // keep the menu on-screen
        ctxmenu.style.display = "block";
        const mw = ctxmenu.offsetWidth, mh = ctxmenu.offsetHeight;
        ctxmenu.style.left = Math.min(cx, window.innerWidth - mw - 4) + "px";
        ctxmenu.style.top = Math.min(cy, window.innerHeight - mh - 4) + "px";
      }

      async function runAction(action, id) {
        if (action === "bind") { select(id); status("bind: pick a target in the panel"); }
        else if (action === "inspect") { select(id); status("inspect " + id); }
        else if (action === "focus") { select(id); await invoke("focus_entity", { id }); await enterFocus(id); status("focused " + id); }
        else if (action === "remove") {
          invoke("remove_entity", { id });
          if (selected === id) { selected = null; renderInspector(); revealFor(null); }
          status("removed " + id + " (Ctrl-Z to undo)");
        } else if (action === "duplicate") {
          const nid = await invoke("duplicate_entity", { id });
          if (nid) { setTimeout(() => select(nid), 60); status("duplicated → " + nid); }
        } else if (action === "makedynamic") {
          // M8.3: dead model → correct dynamic body in ≤2 clicks (one undoable tx). Then surface the
          // collider-intelligence warnings (each explained + a one-click fix), caught at author time.
          const ok = await invoke("make_dynamic", { id });
          if (ok) { select(id); status("made " + id + " dynamic — it falls (Ctrl-Z to undo)"); showPhysWarnings(id); }
          else status("could not make " + id + " dynamic");
        }
      }

      // ── M8.3 collider intelligence: surface check_physics warnings for an entity, each with a one-click
      // fix. Caught at AUTHOR time, never as a runtime glitch; the fix re-runs the check (it must clear). ──
      const physWarn = document.createElement("div");
      physWarn.id = "physWarn";
      physWarn.style.cssText = "position:fixed;z-index:62;display:none;right:12px;bottom:12px;max-width:340px;background:#2a1f1b;border:1px solid #c08040;border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.4;box-shadow:0 6px 22px rgba(0,0,0,.55)";
      document.body.appendChild(physWarn);
      async function showPhysWarnings(id) {
        const warns = await invoke("physics_check", { id });
        if (!warns || !warns.length) { physWarn.style.display = "none"; return; }
        physWarn.innerHTML = `<div style="font-weight:700;margin-bottom:4px;color:#ffcf9a">⚠ ${warns.length} physics issue${warns.length>1?"s":""} (caught before runtime)</div>`;
        for (const w of warns) {
          const row = document.createElement("div");
          row.style.cssText = "margin:6px 0;padding-bottom:6px;border-bottom:1px solid #4a3a2a";
          row.innerHTML = `<div style="opacity:.9">${w.message}</div>`;
          const btn = document.createElement("button");
          btn.textContent = w.fixLabel;
          btn.style.cssText = "margin-top:4px;padding:2px 8px;font-size:11px;background:#5a4030";
          btn.onclick = async () => {
            const ok = await invoke("physics_fix", { id, action: w.fixAction });
            status(ok ? ("fixed: " + w.issue) : ("could not fix " + w.issue));
            showPhysWarnings(id); // re-run the check — the fixed issue must clear
          };
          row.appendChild(btn);
          physWarn.appendChild(row);
        }
        physWarn.style.display = "block";
      }
      // Close the warnings panel on Escape (alongside the focus/menu Escape handlers).
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") physWarn.style.display = "none"; });

      // Hover details: debounced peek-on-settle; the entity_details fetch crosses JS only when the
      // hovered entity CHANGES — never per frame (invariant 4: the render hot path stays 0 IPC/frame).
      let lastHover = null, hoverTimer = null;
      vp.addEventListener("mousemove", (ev) => {
        if (hoverTimer) clearTimeout(hoverTimer);
        if (ctxmenu.style.display === "block" || rcStart) return; // no tooltip while a menu is open / orbiting
        const cx = ev.clientX, cy = ev.clientY;
        hoverTimer = setTimeout(async () => {
          const id = await invoke("viewport_peek", { x: cx / window.innerWidth, y: cy / window.innerHeight });
          // A menu opened or a drag began while this peek was in flight → abort: don't fetch details and
          // don't paint a stale tooltip over the menu (the await points aren't covered by the guard above).
          if (ctxmenu.style.display === "block" || rcStart) return;
          if (id === lastHover) return; // same entity → no boundary crossing for details
          lastHover = id;
          if (!id) { hideTip(); return; }
          const d = await invoke("entity_details", { id });
          if (d && lastHover === id && ctxmenu.style.display !== "block") showTooltip(d, cx, cy);
        }, 130);
      });
      vp.addEventListener("mouseleave", hideTip);

      function showTooltip(d, cx, cy) {
        const caps = [];
        if (d.provides?.length) caps.push("provides " + d.provides.join(", "));
        if (d.requires?.length) caps.push("requires " + d.requires.join(", "));
        tooltip.innerHTML =
          "<b>" + (d.name || d.id) + "</b>" +
          (d.components?.length ? "<br>" + d.components.join(", ") : "") +
          (caps.length ? "<br><span style='opacity:.65'>" + caps.join(" · ") + "</span>" : "") +
          (d.boundTo?.length ? "<br><span style='color:#9fe'>tracking " + d.boundTo.length + "</span>" : "");
        tooltip.style.left = Math.min(cx + 14, window.innerWidth - 290) + "px";
        tooltip.style.top = (cy + 14) + "px";
        tooltip.style.display = "block";
      }

      function doUndo() { invoke("undo"); status("undo"); if (selected) setTimeout(() => revealFor(selected), 40); }
      $("undo").onclick = doUndo;
      window.addEventListener("keydown", (e) => { if ((e.ctrlKey||e.metaKey) && e.key === "z") doUndo(); });

      // ── wallet / token economy (M7) ────────────────────────────────────────────
      // The balance the paid tiers meter against. The engine is free forever; only generate/buy/edit
      // touch this. Top-up is a sandbox ($10 ≈ 100 tokens) — NO real money. Updated from every paid op.
      function setWallet(bal) { if (bal != null) $("walletBal").textContent = bal; }
      async function refreshWallet() { try { const w = await invoke("wallet_info"); setWallet(w.balance); } catch (e) {} }
      $("topup").onclick = async () => {
        const r = await invoke("top_up");
        setWallet(r.balance);
        status(r.message || ("balance: " + r.balance + " tokens"));
      };
      async function doAiEdit(id) {
        if (!id) return;
        const r = await invoke("ai_edit", { id });
        setWallet(r.balance);
        status(r.message || (r.ok ? "edited" : "edit refused"));
        if (r.ok) setTimeout(() => { if (selected === id) renderInspector(); }, 60);
      }

      // connect: the core pushes ProjectionDeltas over the Channel (desktop binding of the M2.4 wire)
      const channel = new Channel();
      channel.onmessage = (delta) => applyDelta(delta);
      invoke("connect", { channel })
        .then(() => { status("connected to /core"); refreshWallet(); })
        .catch((e) => status("connect failed: " + e));
    </script>
  </body>
</html>
