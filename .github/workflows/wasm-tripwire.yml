name: wasm-tripwire

# Web-compatibility tripwire (ADR-003): the crates that cross to the browser must keep compiling to
# wasm32 so web-incompatible changes are caught the week they land, not at Phase 2. Fails loudly.
# Per ADR-006 this builds only the crates that actually cross (today: spikes/wasm = wgpu; loro also
# proven; metrocalk-assets = glTF import + mesh-data prep, M4). It must NEVER build flecs_ecs /
# metrocalk-core (native-only) for wasm32 — `-p metrocalk-assets` pulls neither (it depends on
# neither). As the real crossable crates appear, add them here, not the Flecs-backed core.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  wasm32-build:
    name: build wasm32 (spikes/wasm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Caches the cargo registry + target dir keyed on Cargo.lock → keeps reruns well under 5 min.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: spikes/wasm

      - name: Build wasm32 (release)
        working-directory: spikes/wasm
        run: |
          cargo build --release --target wasm32-unknown-unknown
          echo "wasm32 build OK"

      - name: Verify the cdylib .wasm artifact was produced
        working-directory: spikes/wasm
        run: |
          test -f target/wasm32-unknown-unknown/release/metrocalk_wasm_spike.wasm \
            && echo "artifact present" \
            || (echo "::error::no wasm32 cdylib produced — web target is broken" && exit 1)

  wasm32-assets:
    name: build wasm32 (metrocalk-assets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The local asset substrate (M4, ADR-006 deliverable 6): glTF/glb import → internal mesh →
      # content-addressed store → GPU vertex packing must reach the browser. `-p metrocalk-assets` builds
      # ONLY that crate + its (pure-Rust) deps — gltf/image/png/bytemuck — never core/ecs/Flecs.
      # KTX2/basis-universal (C++ FFI) is deliberately NOT a dependency (it's native-only — see the asset
      # ADR); that is the documented native/browser divergence.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-assets --release --target wasm32-unknown-unknown
          echo "metrocalk-assets wasm32 build OK"

  wasm32-economy:
    name: build wasm32 (metrocalk-economy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The token economy (M7, ADR-004/006): the ledger + cost model + payout + payment seam must reach
      # the browser editor (the zero-install funnel meters the same paid tiers). `-p metrocalk-economy`
      # builds ONLY that pure crate + serde/thiserror — never core/ecs/Flecs (it depends on neither;
      # that absence is also the free-path tripwire in ci.yml).
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-economy --release --target wasm32-unknown-unknown
          echo "metrocalk-economy wasm32 build OK"

  wasm32-physics:
    name: build wasm32 (metrocalk-physics)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The physics subsystem (M8.2, ADR-021) must cross to the browser (P5, ADR-006): Rapier 0.33 +
      # Parry 0.28 are pure Rust. The DEFAULT `deterministic` config (f64 + enhanced-determinism, no
      # rayon) is the wasm-safe authoritative build — the `fast` config's rayon is native-only and is
      # not built here. `-p metrocalk-physics` pulls rapier/parry/serde/blake3 — never core/ecs/Flecs.
      - name: Build wasm32 (release, deterministic config)
        run: |
          cargo build -p metrocalk-physics --release --target wasm32-unknown-unknown
          echo "metrocalk-physics wasm32 build OK"

  wasm32-interchange:
    name: build wasm32 (metrocalk-interchange)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The interchange tier (M8.5, ADR-024): URDF (urdf-rs/yaserde) + USD (openusd) behind the
      # Interchange trait, mapping to our neutral types + the /physics boundary. All pure Rust, so the
      # crate crosses to wasm — the URDF path is fully wasm-portable; USD's openusd `Stage::open` is
      # file-based, so USD IMPORT is a native action at runtime (the ADR-006 boundary), but the crate still
      # BUILDS for wasm. `-p metrocalk-interchange` pulls urdf-rs/openusd/physics — never core/ecs/Flecs.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-interchange --release --target wasm32-unknown-unknown
          echo "metrocalk-interchange wasm32 build OK"

  wasm32-gizmo:
    name: build wasm32 (metrocalk-gizmo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The transform gizmo (M9.1 / G1, ADR-025) renders + manipulates in the browser editor (ADR-006).
      # It's pure Rust (glam math behind a plain-array boundary — no GPU/egui coupling), so it crosses to
      # wasm. `-p metrocalk-gizmo` pulls glam/serde — never core/ecs/Flecs/rapier.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-gizmo --release --target wasm32-unknown-unknown
          echo "metrocalk-gizmo wasm32 build OK"

  wasm32-skeleton:
    name: build wasm32 (metrocalk-skeleton)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The skeletal-posing runtime (M9.3 / G3, ADR-027): FK + 2-bone IK + LBS(+DQS) on glam behind our own
      # Skeleton/Pose types (deliverable 8 — load + FK + IK + LBS reach the browser, ADR-006). Pure Rust
      # (glam + the gizmo crate's plain-array types), so it crosses to wasm. `-p metrocalk-skeleton` pulls
      # glam/metrocalk-gizmo — never core/ecs/Flecs/rapier.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-skeleton --release --target wasm32-unknown-unknown
          echo "metrocalk-skeleton wasm32 build OK"

  wasm32-deform:
    name: build wasm32 (metrocalk-deform)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The high-fidelity deformation tier (M9.5 / G5, ADR-029): the ARAP handle-deformer + auto-skin-weights
      # reimplemented on our OWN deterministic primitives (a fixed-sweep Jacobi SVD + a sequential dense
      # Cholesky — NO rayon, the audited-out determinism hazard), f64 throughout. Pure Rust (no foreign math
      # type leaks), so the deform path reaches the browser (ADR-006). `-p metrocalk-deform` pulls only
      # metrocalk-skeleton (glam + the gizmo plain arrays) — never core/ecs/Flecs/rapier.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-deform --release --target wasm32-unknown-unknown
          echo "metrocalk-deform wasm32 build OK"

  wasm32-csg:
    name: build wasm32 (metrocalk-csg)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The robust exact-predicate CSG tier (M13.2 / ADR-051): a BSP mesh-boolean whose vertex-vs-plane
      # classification is exact (Shewchuk `orient3d`, the zero-dependency `no_std` `robust` crate) + an
      # always-on watertight/manifold validator, all behind our own `Csg` trait. Pure Rust, no rayon/GPU/C —
      # so robust geometry crosses to the browser (a carve is server-authoritative on web, but the crate
      # itself must keep compiling, ADR-006/020). `-p metrocalk-csg` pulls only `robust` — never
      # core/ecs/Flecs/rapier. (Unlike metrocalk-dst, which is native-only via rapier and excluded.)
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-csg --release --target wasm32-unknown-unknown
          echo "metrocalk-csg wasm32 build OK"

  wasm32-ivm:
    name: build wasm32 (metrocalk-ivm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The Incremental Engine spike (M13.4 / ADR-053): a hand-rolled minimal IVM operator (the compat-query
      # maintained view) behind our own `IncrementalView` trait. THIS BUILD IS THE CRATE-AUDIT ANSWER — the
      # hand-rolled operator is ZERO-DEP + wasm-clean, where `dbsp` (~106K SLoC) has an unconfirmed wasm32
      # target. `-p metrocalk-ivm` pulls only std. (An incremental query is server-authoritative on web per
      # ADR-006/020, but the operator itself must keep compiling to the browser.)
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-ivm --release --target wasm32-unknown-unknown
          echo "metrocalk-ivm wasm32 build OK"

  wasm32-lattice:
    name: build wasm32 (metrocalk-lattice)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # The Lattice Core (M13.7 / ADR-056): hand-rolled lattice types (GSet / MaxReg / the OR-Set
      # ring-in-lattice) + the monotone/non-monotone classification behind our own `Lattice` trait. THIS
      # BUILD IS THE CRATE-AUDIT ANSWER — the hand-roll is ZERO-DEP + wasm-clean, where Hydro/DFIR (`dfir_rs`)
      # + the `lattices` crate are pre-1.0 research-grade with unconfirmed wasm. `-p metrocalk-lattice` pulls
      # only std.
      - name: Build wasm32 (release)
        run: |
          cargo build -p metrocalk-lattice --release --target wasm32-unknown-unknown
          echo "metrocalk-lattice wasm32 build OK"
