name: ci

# Native workspace gate: formatting, lints (pedantic + unsafe-forbid), and tests across
# core/transport/plugins. The M0 spikes are excluded from the workspace, so this never builds the
# Flecs C core on CI. The wasm32 web target is covered by wasm-tripwire.yml.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workspace:
    name: fmt + clippy + test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable) + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: No flecs_ecs leakage outside the ecs wrapper crate (ADR-001/006)
        run: |
          if grep -rn "flecs_ecs" core transport plugins --include='*.rs'; then
            echo "::error::flecs_ecs leaked outside the ecs wrapper crate — see ADR-001 (no Flecs types past the wrapper)"
            exit 1
          fi
          echo "no flecs_ecs outside ecs/ — wrapper boundary intact"

      - name: No loro leakage outside the core crate (invariant 5)
        run: |
          if grep -rn "loro" transport plugins ecs --include='*.rs' --include='*.toml' | grep -v '// loro' | grep -v '#.*loro'; then
            echo "::error::loro leaked outside the core crate — Loro types must stay behind the commit pipeline (invariant 5)"
            exit 1
          fi
          echo "no loro outside core/ — pipeline boundary intact"

      - name: The free engine never depends on the token economy (M7 free-path proof, ADR-004)
        run: |
          # core/ecs (the FREE ENGINE) must NEVER link metrocalk-economy — that crate-graph edge is the
          # compile-time proof the free/offline path can't touch the meter. Only editor-shell links it
          # (at the three paid sinks). If the meter ever creeps into the engine, fail loudly.
          for crate in metrocalk-core metrocalk-ecs; do
            if cargo tree -p "$crate" -e normal | grep -q "metrocalk-economy"; then
              echo "::error::$crate links metrocalk-economy — the free engine must not depend on the meter (ADR-004 free-path proof)"
              exit 1
            fi
          done
          echo "the free engine (core/ecs) does not link the economy — free-path boundary intact"

      - name: No foreign decoder types leak past the asset-importer wrapper (invariant 5)
        run: |
          # gltf:: / image:: must live ONLY behind the MeshSource trait, in assets/src/gltf_import.rs
          # (the same discipline as flecs_ecs-in-/ecs). Comment lines (prose mentioning the types) skipped.
          if grep -rn "gltf::\|image::" assets/src --include='*.rs' | grep -v 'gltf_import.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::gltf::/image:: leaked outside assets/src/gltf_import.rs — foreign decoder types must stay behind the MeshSource trait (invariant 5; mirrors ADR-001/006)"
            exit 1
          fi
          echo "no gltf::/image:: outside the importer wrapper — boundary intact"

      - name: test
        run: cargo test --workspace

      # The opt-in `ws` transport impl (transport/src/impls/ws.rs — the one REAL transport, behind the
      # non-default `ws` feature) is invisible to the default workspace build/lint/test above. Build,
      # lint, and test it explicitly so the live WebSocket round-trip can't regress undetected.
      - name: ws transport impl — clippy + test (the real transport, dark on the default path)
        run: |
          cargo clippy -p metrocalk-transport --all-targets --features ws -- -D warnings
          cargo test -p metrocalk-transport --features ws

  editor-vitest:
    # The React editor projection (editor/, ADR-010) has a real vitest suite (transport-frame decode,
    # optimistic-reconcile, 5k selective-subscription projection, end-to-end wiring) that no Rust CI job
    # touches — it would regress invisibly. This runs it. (editor/ uses pnpm — pnpm-lock.yaml is tracked.)
    name: vitest (editor TS projection)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install (frozen lockfile)
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: vitest
        working-directory: editor
        run: pnpm test
