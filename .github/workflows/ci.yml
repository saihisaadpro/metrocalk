name: ci

# Native workspace gate: formatting, lints (pedantic + unsafe-forbid), and tests across
# core/transport/plugins. The M0 spikes are excluded from the workspace, so this never builds the
# Flecs C core on CI. The wasm32 web target is covered by wasm-tripwire.yml.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workspace:
    name: fmt + clippy + test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace
