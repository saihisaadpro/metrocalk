name: ci

# Native workspace gate: formatting, lints (pedantic + unsafe-forbid), and tests across
# core/transport/plugins. The M0 spikes are excluded from the workspace, so this never builds the
# Flecs C core on CI. The wasm32 web target is covered by wasm-tripwire.yml.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workspace:
    name: fmt + clippy + test (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable) + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: No flecs_ecs leakage outside the ecs wrapper crate (ADR-001/006)
        run: |
          if grep -rn "flecs_ecs" core transport plugins --include='*.rs'; then
            echo "::error::flecs_ecs leaked outside the ecs wrapper crate — see ADR-001 (no Flecs types past the wrapper)"
            exit 1
          fi
          echo "no flecs_ecs outside ecs/ — wrapper boundary intact"

      - name: No loro leakage outside the core crate (invariant 5)
        run: |
          if grep -rn "loro" transport plugins ecs --include='*.rs' --include='*.toml' | grep -v '// loro' | grep -v '#.*loro'; then
            echo "::error::loro leaked outside the core crate — Loro types must stay behind the commit pipeline (invariant 5)"
            exit 1
          fi
          echo "no loro outside core/ — pipeline boundary intact"

      - name: The free engine never depends on the token economy (M7 free-path proof, ADR-004)
        run: |
          # core/ecs (the FREE ENGINE) must NEVER link metrocalk-economy — that crate-graph edge is the
          # compile-time proof the free/offline path can't touch the meter. Only editor-shell links it
          # (at the three paid sinks). If the meter ever creeps into the engine, fail loudly.
          for crate in metrocalk-core metrocalk-ecs; do
            if cargo tree -p "$crate" -e normal | grep -q "metrocalk-economy"; then
              echo "::error::$crate links metrocalk-economy — the free engine must not depend on the meter (ADR-004 free-path proof)"
              exit 1
            fi
          done
          echo "the free engine (core/ecs) does not link the economy — free-path boundary intact"

      - name: The free engine never depends on the AI/LLM tier (M12.4 AI-is-a-guest, ADR-048)
        run: |
          # core/ecs (the FREE, OFFLINE engine) must NEVER link the AI tier's network deps (an MCP / LLM /
          # HTTP crate) — AI is a GUEST: the engine + Rules + clicks-authoring + the compose validate/apply
          # path (core/src/compose.rs) all work with the LLM off. The compose grammar/validation is pure
          # /core data; the LLM that PRODUCES a Composition is a network SEAM (editor-shell / the MCP server),
          # never on the offline engine path. Mirrors the M7 free-path proof above. (rmcp = the M12.4 MCP
          # server crate; reqwest/hyper = a remote-LLM HTTP client.)
          for crate in metrocalk-core metrocalk-ecs; do
            if cargo tree -p "$crate" -e normal | grep -qiE "rmcp|reqwest|hyper"; then
              echo "::error::$crate links an AI/LLM/MCP crate — AI must stay a GUEST (ADR-048 offline-first); the engine must work with the LLM off"
              exit 1
            fi
          done
          echo "the free engine (core/ecs) does not link the AI/LLM/MCP tier — AI-is-a-guest boundary intact"

      - name: No foreign decoder types leak past the asset-importer wrappers (invariant 5)
        run: |
          # gltf:: / image:: / tobj:: / ufbx:: / basis_universal:: must live ONLY behind the MeshSource trait,
          # in the importer wrappers (gltf_import.rs · image_import.rs · obj_import.rs [M11.1] · fbx_import.rs
          # [M11.1, native] · ktx2_import.rs [M11.1, native] · env_import.rs [M11.3, HDR env maps]); the
          # crypto type ed25519_dalek:: must stay behind signed.rs [M11.5, the signing backing] — the same
          # discipline as flecs_ecs-in-/ecs. Comment lines (prose mentioning the types) skipped. demo.rs is a
          # test-FIXTURE generator (it ENCODES demo PNGs via `image::write_to` — the inverse of the import/
          # decode path this gate guards), so it's exempt like the wrappers, not a decode-path leak.
          if grep -rn "gltf::\|image::\|tobj::\|ufbx::\|basis_universal::\|ed25519_dalek::" assets/src --include='*.rs' | grep -v 'gltf_import.rs' | grep -v 'image_import.rs' | grep -v 'obj_import.rs' | grep -v 'fbx_import.rs' | grep -v 'ktx2_import.rs' | grep -v 'env_import.rs' | grep -v 'signed.rs' | grep -v 'demo.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::a foreign type (gltf::/image::/tobj::/ufbx::/basis_universal::/ed25519_dalek::) leaked outside its wrapper module — it must stay behind the MeshSource/ProvenanceVerifier trait (invariant 5; mirrors ADR-001/006/040/044)"
            exit 1
          fi
          echo "no gltf::/image::/tobj::/ufbx::/basis_universal::/ed25519_dalek:: outside the wrapper modules — boundary intact"

      - name: No rapier/parry types leak outside the /physics crate (invariant 5, M8.2/ADR-021)
        run: |
          # rapier::/parry:: (+ the crate names) must live ONLY behind the Physics trait, in /physics —
          # the same discipline as flecs_ecs-in-/ecs, loro-in-/core, gltf::-in-the-importer. Every other
          # crate drives physics through the project-owned Physics trait + boundary types ([f64;3]/[f64;4]),
          # never a rapier/parry type. Prose comments mentioning "rapier" are fine (no `::`/crate-name).
          if grep -rn "rapier3d\|rapier::\|parry3d\|parry::" core ecs transport plugins assets economy editor-shell tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::rapier/parry leaked outside /physics — physics types must stay behind the Physics trait (invariant 5; mirrors ADR-001)"
            exit 1
          fi
          echo "no rapier/parry outside /physics — Physics-trait boundary intact"

      - name: No extism/wasmtime types leak outside the /plugins crate (invariant 5, M12.3/ADR-047)
        run: |
          # extism::/wasmtime:: (the WASM host SDK) must live ONLY behind the PluginHost trait, in /plugins —
          # the same discipline as rapier-in-/physics, loro-in-/core, gltf::-in-the-importer. Every other crate
          # drives plugins through the project-owned PluginHost trait + our neutral types (&[u8] in/out,
          # PluginError/Sandbox), never an extism/wasmtime type. The example WASM plugin (plugins/example-plugin)
          # is excluded from the workspace; its extism-pdk use is the plugin side, not the host API. Prose
          # comments mentioning "extism"/"wasmtime" (no `::`) are fine.
          if grep -rn "extism::\|extism_pdk\|wasmtime::" core ecs transport assets economy physics interchange gizmo skeleton deform editor-shell tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::extism/wasmtime leaked outside /plugins — host types must stay behind the PluginHost trait (invariant 5; mirrors ADR-001/021)"
            exit 1
          fi
          echo "no extism/wasmtime outside /plugins — PluginHost-trait boundary intact"

      - name: No urdf/openusd types leak outside the /interchange crate (invariant 5, M8.5/ADR-024)
        run: |
          # The robotics/VFX import crates (urdf_rs, openusd) must live ONLY behind the Interchange trait,
          # in /interchange — exactly as rapier lives in /physics + gltf in the importer. Every other crate
          # consumes an import through the project-owned Interchange trait + our neutral types (SceneImport
          # carrying the /physics boundary types), never a urdf_rs/openusd type. Prose comments are fine.
          if grep -rn "urdf_rs\|openusd" core ecs transport plugins assets economy physics editor-shell tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::urdf/openusd leaked outside /interchange — import types must stay behind the Interchange trait (invariant 5; mirrors ADR-001/014)"
            exit 1
          fi
          echo "no urdf/openusd outside /interchange — Interchange-trait boundary intact"

      - name: No egui-ecosystem / transform-gizmo / glam types leak past the Gizmo trait (invariant 5, M9.1/ADR-025)
        run: |
          # The gizmo's PUBLIC surface is our own plain arrays — glam is an internal math detail of /gizmo
          # (like rapier in /physics), and the egui ecosystem + transform-gizmo are NOT adopted at all (the
          # reference/fallback only). So: no glam outside the crates that legitimately use it (the wgpu
          # viewport src-tauri + /gizmo internals — both excluded here), and no egui/transform-gizmo anywhere.
          if grep -rn "transform_gizmo\|epaint::\|ecolor::\|emath::\|egui::" core ecs transport plugins assets economy physics interchange editor-shell tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::egui-ecosystem / transform-gizmo type leaked — the gizmo is our own behind the Gizmo trait (invariant 5)"
            exit 1
          fi
          if grep -rn "\bglam::" core ecs transport plugins assets economy interchange editor-shell/src tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::glam leaked past the Gizmo trait — gizmo math must stay behind plain-array boundary types (invariant 5)"
            exit 1
          fi
          echo "no egui/transform-gizmo/glam leak past the Gizmo trait — boundary intact"

      - name: No exact-predicate / CSG types leak outside the /csg crate (invariant 5, M13.2/ADR-051)
        run: |
          # The robust geometric predicates (robust::) + any third-party CSG (csgrs::) must live ONLY behind
          # the project-owned Csg trait, in /csg — the same discipline as rapier-in-/physics, gltf in the
          # importer. Every other crate drives booleans through the Csg trait + plain-array boundary types
          # (TriMesh / [f64;3]); editor-shell's csg_intent consumes the trait, never a predicate type. Prose
          # comments mentioning "robust"/"csgrs" (no `::`) are fine.
          if grep -rn "robust::\|csgrs::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::a CSG/predicate type (robust::/csgrs::) leaked outside /csg — booleans must stay behind the Csg trait (invariant 5; mirrors ADR-001/021/029)"
            exit 1
          fi
          echo "no robust::/csgrs:: outside /csg — Csg-trait boundary intact"

      - name: No ezpz constraint-solver types leak outside the /constraint crate (invariant 5, M15.6/ADR-076)
        run: |
          # `ezpz::` (the embedded KittyCAD/Zoo 2D constraint solver — Levenberg-Marquardt over faer sparse-LU,
          # its raw determinism unverified) must live ONLY behind the project-owned Solver trait, in /constraint
          # — the same discipline as robust-in-/csg, rapier-in-/physics. Every other crate drives constraints
          # through the plain-array Sketch/SolveResult boundary; editor-shell's constraint_intent consumes the
          # trait, never an ezpz type. Prose comments mentioning "ezpz" (no `::`) are fine.
          if grep -rn "ezpz::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg sdf hotpatch ivm authoring efficiency lattice editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::an ezpz constraint type (ezpz::) leaked outside /constraint — constraints must stay behind the Solver trait (invariant 5; mirrors ADR-051/ADR-029)"
            exit 1
          fi
          echo "no ezpz:: outside /constraint — Solver-trait boundary intact"

      - name: No hot-patch backend types leak outside the /hotpatch crate (invariant 5, M13.3/ADR-052)
        run: |
          # The `subsecond` binary hot-patch backend (subsecond::) — the pre-1.0, tip-crate-only, dev-only
          # live code-patcher — must live ONLY behind the project-owned HotPatch trait, in /hotpatch (the
          # same discipline as rapier-in-/physics, robust-in-/csg). Every other crate drives a hot-patch
          # through the HotPatch trait; nothing else names the foreign patcher. (subsecond is not a
          # dependency yet — the production dev backing is a documented `dx`-harness LOCAL gate — so this
          # gate RESERVES the boundary for when it lands. Prose mentions of "subsecond" without `::` are fine.)
          if grep -rn "subsecond::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::the subsecond hot-patch backend leaked outside /hotpatch — live patching must stay behind the HotPatch trait (invariant 5)"
            exit 1
          fi
          echo "no subsecond:: outside /hotpatch — HotPatch-trait boundary intact"

      - name: No IVM engine types leak outside the /ivm crate (invariant 5, M13.4/ADR-053)
        run: |
          # The Incremental Engine spike hand-rolls a minimal operator behind the project-owned
          # `IncrementalView` trait (the crate-audit verdict: dbsp is ~106K SLoC + wasm-unconfirmed → own it).
          # If a heavier query family ever justifies adopting `dbsp` / `differential-dataflow` / `timely`, it
          # must live ONLY in /ivm behind the trait — the same discipline as rapier-in-/physics. This gate
          # RESERVES the boundary in advance (those crates are not dependencies today). Prose mentions of the
          # crate names without `::` are fine.
          if grep -rn "dbsp::\|differential_dataflow::\|timely::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg hotpatch editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::an IVM engine type (dbsp::/differential_dataflow::/timely::) leaked outside /ivm — incremental views must stay behind the IncrementalView trait (invariant 5)"
            exit 1
          fi
          echo "no dbsp::/differential_dataflow::/timely:: outside /ivm — IncrementalView-trait boundary intact"

      - name: No ASP/solver runtime types leak outside the /authoring crate (invariant 5, M13.5/ADR-054)
        run: |
          # The verifiable AI-authoring substrate hand-rolls its bounded PCG solver behind the project-owned
          # Pcg/Solver trait (the crate-audit verdict: clingo/ASP is native-only C++ FFI + grounding blow-up →
          # own a bounded, deterministic, offline solver). If a heavier design space ever justifies adopting
          # `clingo`, it must live ONLY in /authoring behind the trait — the AI-is-a-guest, no-solver-runtime-
          # in-the-core discipline. This gate RESERVES the boundary (clingo is not a dependency today). Prose
          # mentions of "clingo"/"ASP" without `::` are fine.
          if grep -rn "clingo::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg hotpatch ivm editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::a solver-runtime type (clingo::) leaked outside /authoring — PCG must stay behind the Pcg trait, AI-as-guest (invariant 5)"
            exit 1
          fi
          echo "no clingo:: outside /authoring — Pcg-trait boundary intact (AI-is-a-guest)"

      - name: No lattice-runtime types leak outside the /lattice crate (invariant 5, M13.7/ADR-056)
        run: |
          # The Lattice Core hand-rolls its lattice TYPES + the monotonicity classification behind the
          # project-owned `Lattice` trait (the crate-audit verdict: Hydro/DFIR `dfir_rs` + the `lattices`
          # crate are pre-1.0 Berkeley-research; we need only the types + classification, not the Hydro
          # dataflow runtime → own it). If the Hydro lattice library is ever adopted, it must live ONLY in
          # /lattice behind the trait. This gate RESERVES the boundary (none is a dependency today). Prose
          # mentions of "lattices"/"Hydro"/"hydroflow" without `::` are fine.
          if grep -rn "lattices::\|dfir_rs::\|hydroflow::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg hotpatch ivm authoring efficiency editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::a lattice-runtime type (lattices::/dfir_rs::/hydroflow::) leaked outside /lattice — lattice types must stay behind the Lattice trait (invariant 5)"
            exit 1
          fi
          echo "no lattices::/dfir_rs::/hydroflow:: outside /lattice — Lattice-trait boundary intact"

      - name: No STEP/OpenCascade geometry-kernel types leak outside the /interchange crate (invariant 5, M15.0/ADR-070, M15.5/ADR-075)
        run: |
          # The M15.0 geometry-path decision: STEP AP242 rides interop behind the CadInterchange trait (the
          # M8.5 pattern), and the FULL trimmed-NURBS path is OpenCascade (OCCT) FFI — native/server-only,
          # OUT of the determinism guarantee. Whatever backs STEP import (a pure-Rust Part-21 reader now; an
          # `opencascade`/`occt`/`steplib`/`ruststep` binding later) must live ONLY behind CadInterchange, in
          # /interchange — exactly as rapier lives in /physics + robust in /csg. Every other crate consumes an
          # import through the neutral CadScene (referenceable faces/edges + a `TriMesh`), never a STEP-kernel
          # type — so OCCT's non-determinism can never leak into the lockstep/replay path (the M13.1 boundary).
          # M15.5 (ADR-075) HARDENS this: the AP242 SEMANTIC-PMI round-trip (geometric_tolerance entities) is a
          # DECLARED SUBSET of the same pure-Rust Part-21 reader/writer, behind CadInterchange; full-ed4
          # conformance + wild-vendor fidelity remain the OCCT native/server seam. A reserve gate for the OCCT
          # dep (not adopted yet). Prose comments are fine.
          if grep -rn "opencascade::\|occt::\|steplib::\|ruststep::" core ecs transport plugins assets economy physics gizmo skeleton deform dst csg sdf hotpatch ivm authoring efficiency lattice editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::a STEP/OCCT kernel type (opencascade::/occt::/steplib::/ruststep::) leaked outside /interchange — CAD import must stay behind CadInterchange (invariant 5; OCCT is native/server-only, OUT of the determinism guarantee — ADR-070)"
            exit 1
          fi
          echo "no opencascade/occt/steplib/ruststep outside /interchange — CadInterchange boundary intact"

      - name: No external FEA-solver types leak past the generative Solver seam (invariant 5, M15.4/ADR-074, M15.5/ADR-075)
        run: |
          # The M15.4 intent-driven generative loop integrates a VALIDATED FEA (CalculiX/Gmsh/OpenFOAM) as an
          # EXTERNAL solver behind the project-owned `Solver` trait (editor-shell/src/generative.rs) — the
          # established couple is preCICE + the preCICE-FMI runner (server-side native; CalculiX/OpenFOAM are
          # NOT native FMUs), and the Rust `fmi` crate is a native-only single-FMU importer. "Integrate, never
          # rebuild Ansys" (§4): whatever backs the external solver (a `precice`/`fmi`/`fmpy` binding) must
          # live ONLY behind the `Solver` trait — exactly as rapier lives in /physics + OCCT behind
          # CadInterchange. Every other crate drives analysis through the trait + our neutral StructuralResult,
          # so the external solver's FP non-determinism can never leak into the reproducibility guarantee (the
          # deterministic ROM is IN the guarantee; the external FEA is OUT — the ADR-074 audit boundary). M15.5
          # (ADR-075) PRODUCTIONIZES the FMI 3.0 co-sim behind the SAME trait: the FmiSolver (single-FMU,
          # native-only) + the deterministic co_simulate orchestration master + the "a co-sim run is a file"
          # audit (editor-shell/src/cosim.rs) — the seam still returns Unavailable (never a fabricated stress).
          # A RESERVE gate: no such dep is adopted yet. Prose comments are fine.
          if grep -rn "precice::\|\bfmi::\|fmpy::\|calculix::\|openfoam::" core ecs transport plugins assets economy physics interchange gizmo skeleton deform dst csg sdf hotpatch ivm authoring efficiency lattice editor-shell mcp tools --include='*.rs' | grep -vE ':[0-9]+:[[:space:]]*//'; then
            echo "::error::an external FEA-solver type (precice::/fmi::/fmpy::/calculix::/openfoam::) leaked past the Solver trait — validated FEA must stay behind the project-owned Solver seam, server-side, OUT of the reproducibility guarantee (invariant 5; integrate-not-rebuild, ADR-074)"
            exit 1
          fi
          echo "no precice/fmi/calculix/openfoam past the Solver trait — the interop-FEA boundary is intact (ADR-074)"

      - name: test
        run: cargo test --workspace

      # The opt-in `ws` transport impl (transport/src/impls/ws.rs — the one REAL transport, behind the
      # non-default `ws` feature) is invisible to the default workspace build/lint/test above. Build,
      # lint, and test it explicitly so the live WebSocket round-trip can't regress undetected.
      - name: ws transport impl — clippy + test (the real transport, dark on the default path)
        run: |
          cargo clippy -p metrocalk-transport --all-targets --features ws -- -D warnings
          cargo test -p metrocalk-transport --features ws

      # The native FBX importer (M11.1/ADR-040) lives behind the non-default `fbx` feature (the `ufbx` C
      # library via FFI) so the wasm-tripwire's default build stays wasm32-clean. Build, lint, and test it
      # explicitly so the importer AND the **measured** crate bake-off (tests/fbx_bakeoff.rs, ufbx vs
      # fbxcel-dom) are not dark. The runner has a C toolchain (`cc` builds ufbx).
      - name: assets FBX importer — clippy + test the native ufbx path + the bake-off (dark on default)
        run: |
          cargo clippy -p metrocalk-assets --all-targets --features fbx -- -D warnings
          cargo test -p metrocalk-assets --features fbx

      # The native KTX2/basis transcoder (M11.1/ADR-040) lives behind the non-default `ktx2` feature (the
      # `basis-universal` C++ codec via FFI) so the wasm-tripwire's default build stays wasm32-clean. Build,
      # lint, and test it (+ the combined fbx+ktx2 surface) explicitly so the **measured** transcode
      # (determinism + timing, ktx2_import.rs) is not dark. The runner has a C++ toolchain (basis builds).
      - name: assets KTX2/basis transcoder — clippy + test the native basis path (dark on default)
        run: |
          cargo clippy -p metrocalk-assets --all-targets --features "fbx ktx2" -- -D warnings
          cargo test -p metrocalk-assets --features ktx2

      # The cryptographic provenance signing backing (M11.5/ADR-044) lives behind the non-default `signing`
      # feature (the pure-Rust `ed25519-dalek` — the C2PA trust model: signed assertions + content binding).
      # The default workspace build never compiles it, so build, lint, and test it explicitly — the
      # sign/verify/tamper/forgery guards must not be dark.
      - name: assets provenance signing — clippy + test the Ed25519 backing (dark on default)
        run: |
          cargo clippy -p metrocalk-assets --all-targets --features signing -- -D warnings
          cargo test -p metrocalk-assets --features signing

  editor-vitest:
    # The React editor projection (editor/, ADR-010) has a real vitest suite (transport-frame decode,
    # optimistic-reconcile, 5k selective-subscription projection, end-to-end wiring) that no Rust CI job
    # touches — it would regress invisibly. This runs it. (editor/ uses pnpm — pnpm-lock.yaml is tracked.)
    name: vitest (editor TS projection)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Pin pnpm 10 explicitly (the tracked pnpm-lock.yaml is a v10 lockfile). corepack's bundled default
      # is older and can't read it, so `--frozen-lockfile` fails — install pnpm 10 directly instead.
      - name: Install pnpm 10
        run: npm install -g pnpm@10

      - name: Install (frozen lockfile)
        working-directory: editor
        run: pnpm install --frozen-lockfile

      - name: vitest
        working-directory: editor
        run: pnpm test
